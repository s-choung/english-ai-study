<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앵두의 번역 릴레이 연습장</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #faf8f4;
    --paper: #ffffff;
    --line: #d6e4f0;
    --line-faint: #eaf1f8;
    --ink: #2c3e50;
    --ink-light: #5d6d7e;
    --accent: #4a7c96;
    --accent-light: #e8f4f8;
    --green: #27ae60;
    --green-light: #e8f8f0;
    --red: #e74c3c;
    --red-light: #fdecea;
    --orange: #f39c12;
    --orange-light: #fef9e7;
    --star-empty: #d5d8dc;
    --star-fill: #f1c40f;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 12px;
  }

  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: var(--bg);
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
  }

  .english-text {
    font-family: 'Noto Serif', Georgia, 'Times New Roman', serif;
    line-height: 1.9;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #4a7c96 0%, #5b9bb5 100%);
    color: #fff;
    padding: 28px 20px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(74,124,150,0.3);
  }
  .header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .header .subtitle {
    font-size: 0.82rem;
    opacity: 0.85;
    font-weight: 300;
  }

  /* Progress Bar */
  .progress-bar-container {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    height: 8px;
    margin: 14px auto 0;
    max-width: 320px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #f1c40f, #f9e76c);
    border-radius: 20px;
    transition: width 0.5s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 0.75rem;
    margin-top: 6px;
    opacity: 0.9;
  }

  /* Container */
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 16px 100px;
  }

  /* Goal Tracker */
  .goal-tracker {
    background: var(--paper);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .goal-tracker .label {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink-light);
  }
  .goal-tracker .count {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .goal-dots {
    display: flex;
    gap: 6px;
  }
  .goal-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: #fff;
    transition: all 0.3s;
  }
  .goal-dot.filled {
    background: var(--accent);
  }

  /* Sentence List */
  .sentence-list {
    background: var(--paper);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .sentence-list-header {
    padding: 16px 20px 12px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--ink);
    border-bottom: 1px solid var(--line-faint);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .sentence-list-header .toggle-icon {
    font-size: 0.75rem;
    color: var(--ink-light);
    transition: transform 0.3s;
  }
  .sentence-list-header.collapsed .toggle-icon {
    transform: rotate(-90deg);
  }
  .sentence-items {
    max-height: 600px;
    overflow-y: auto;
    transition: max-height 0.4s ease;
  }
  .sentence-items.collapsed {
    max-height: 0;
    overflow: hidden;
  }
  .sentence-item {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid var(--line-faint);
    cursor: pointer;
    transition: background 0.2s;
    gap: 12px;
  }
  .sentence-item:last-child { border-bottom: none; }
  .sentence-item:hover { background: var(--accent-light); }
  .sentence-item.active { background: var(--accent-light); }
  .sentence-item .num {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--ink-light);
    min-width: 24px;
  }
  .sentence-item .preview {
    flex: 1;
    font-size: 0.82rem;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'Noto Serif', Georgia, serif;
  }
  .sentence-item .stars {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }
  .star {
    width: 16px;
    height: 16px;
    display: inline-block;
  }
  .star svg { width: 100%; height: 100%; }
  .star.empty svg path { fill: var(--star-empty); }
  .star.filled svg path { fill: var(--star-fill); }

  /* Exercise Area */
  .exercise-area {
    display: none;
  }
  .exercise-area.visible {
    display: block;
  }

  /* Stage Tabs */
  .stage-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .stage-tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--ink-light);
    box-shadow: var(--shadow);
  }
  .stage-tab:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .stage-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .stage-tab.completed {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
  }
  .stage-tab.completed.active {
    background: var(--green);
    color: #fff;
  }
  .stage-tab .tab-label {
    display: block;
    font-size: 0.72rem;
    margin-top: 2px;
    opacity: 0.8;
  }

  /* Card */
  .card {
    background: var(--paper);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  /* Lined paper effect */
  .lined-paper {
    background-image: repeating-linear-gradient(
      transparent,
      transparent 31px,
      var(--line-faint) 31px,
      var(--line-faint) 32px
    );
    background-position: 0 12px;
    padding: 20px 24px;
  }

  .sentence-number-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
  }

  /* Stage 1 */
  .english-display {
    font-family: 'Noto Serif', Georgia, serif;
    font-size: 1.08rem;
    line-height: 2;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .english-display .keyword {
    background: linear-gradient(to bottom, transparent 60%, #fff3cd 60%);
    cursor: help;
    position: relative;
    font-weight: 600;
    transition: background 0.2s;
  }
  .english-display .keyword:hover {
    background: linear-gradient(to bottom, transparent 40%, #ffe082 40%);
  }

  .tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    padding: 6px 12px;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
  }
  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--ink);
  }
  .keyword:hover .tooltip {
    opacity: 1;
  }

  .reveal-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--line);
  }

  .korean-translation {
    font-size: 0.95rem;
    color: var(--accent);
    line-height: 1.8;
    padding: 14px 18px;
    background: var(--accent-light);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    display: none;
  }
  .korean-translation.visible {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    gap: 6px;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #3d6a80; }

  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
  }
  .btn-outline:hover { background: var(--accent-light); }

  .btn-sm {
    padding: 7px 14px;
    font-size: 0.78rem;
  }

  .btn-block {
    width: 100%;
    padding: 12px;
  }

  /* Self-assessment */
  .self-assess {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .assess-btn {
    flex: 1;
    min-width: 100px;
    padding: 10px 8px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .assess-btn:hover { border-color: var(--accent); }
  .assess-btn.selected-good {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
  }
  .assess-btn.selected-ok {
    background: var(--orange-light);
    border-color: var(--orange);
    color: var(--orange);
  }
  .assess-btn.selected-bad {
    background: var(--red-light);
    border-color: var(--red);
    color: var(--red);
  }

  /* Stage 2 */
  .korean-display {
    font-size: 1rem;
    line-height: 1.9;
    color: var(--ink);
    padding: 14px 18px;
    background: #f8f5ff;
    border-radius: 8px;
    border-left: 3px solid #8e7cc3;
    margin-bottom: 16px;
  }

  .writing-area {
    width: 100%;
    min-height: 100px;
    padding: 14px 16px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    font-family: 'Noto Serif', Georgia, serif;
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--ink);
    resize: vertical;
    transition: border-color 0.2s;
    background: #fff;
  }
  .writing-area:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,124,150,0.1);
  }
  .writing-area::placeholder {
    color: #b0bec5;
    font-family: 'Noto Sans KR', sans-serif;
    font-style: normal;
    font-size: 0.85rem;
  }

  .comparison {
    display: none;
    margin-top: 16px;
    gap: 12px;
  }
  .comparison.visible {
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.3s ease;
  }
  .comparison-box {
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 0.9rem;
    line-height: 1.8;
  }
  .comparison-box.mine {
    background: #f0f4f8;
    border-left: 3px solid var(--ink-light);
  }
  .comparison-box.mine .comp-label {
    color: var(--ink-light);
  }
  .comparison-box.answer {
    background: var(--green-light);
    border-left: 3px solid var(--green);
    font-family: 'Noto Serif', Georgia, serif;
  }
  .comparison-box.answer .comp-label {
    color: var(--green);
  }
  .comp-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    display: block;
  }

  /* Stage 3 */
  .blanks-sentence {
    font-family: 'Noto Serif', Georgia, serif;
    font-size: 1.05rem;
    line-height: 2.4;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .blank-input {
    display: inline-block;
    width: auto;
    min-width: 80px;
    max-width: 200px;
    padding: 4px 10px;
    border: none;
    border-bottom: 2px dashed var(--accent);
    background: var(--accent-light);
    font-family: 'Noto Serif', Georgia, serif;
    font-size: 0.95rem;
    color: var(--ink);
    text-align: center;
    transition: all 0.2s;
    border-radius: 4px 4px 0 0;
    margin: 0 2px;
    vertical-align: baseline;
  }
  .blank-input:focus {
    outline: none;
    border-bottom-color: var(--accent);
    border-bottom-style: solid;
    background: #dfeef5;
  }
  .blank-input.correct {
    background: var(--green-light);
    border-bottom-color: var(--green);
    border-bottom-style: solid;
    color: var(--green);
    font-weight: 600;
  }
  .blank-input.wrong {
    background: var(--red-light);
    border-bottom-color: var(--red);
    border-bottom-style: solid;
    color: var(--red);
  }
  .blank-input::placeholder {
    color: #a0c4d8;
    font-size: 0.8rem;
  }

  .correct-answer-label {
    font-family: 'Noto Serif', Georgia, serif;
    font-size: 0.8rem;
    color: var(--green);
    font-weight: 600;
    margin-left: 4px;
  }

  .hint-area {
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    padding: 12px;
    background: #fffde7;
    border-radius: 8px;
    display: none;
  }
  .hint-area.visible { display: flex; }
  .hint-tag {
    font-size: 0.78rem;
    padding: 4px 10px;
    background: #fff8c4;
    border-radius: 20px;
    color: #8d6e00;
    font-weight: 500;
    font-family: 'Noto Serif', Georgia, serif;
  }

  /* Buttons Row */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  /* Navigation */
  .nav-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    justify-content: space-between;
  }
  .nav-btn {
    padding: 10px 20px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--ink-light);
    transition: all 0.2s;
  }
  .nav-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn:disabled {
    opacity: 0.4;
    cursor: default;
  }

  /* Result message */
  .result-msg {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-top: 12px;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .result-msg.visible { display: block; }
  .result-msg.perfect {
    background: var(--green-light);
    color: var(--green);
    border: 1px solid #c8e6c9;
  }
  .result-msg.partial {
    background: var(--orange-light);
    color: #e67e22;
    border: 1px solid #ffe0b2;
  }

  /* Vocab list */
  .vocab-list {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .vocab-chip {
    font-size: 0.75rem;
    padding: 4px 10px;
    background: #f0f4f8;
    border-radius: 20px;
    color: var(--ink-light);
  }
  .vocab-chip .en {
    font-family: 'Noto Serif', Georgia, serif;
    font-weight: 600;
    color: var(--ink);
  }

  /* Scrollbar */
  .sentence-items::-webkit-scrollbar { width: 4px; }
  .sentence-items::-webkit-scrollbar-track { background: transparent; }
  .sentence-items::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  /* Mobile */
  @media (max-width: 480px) {
    .header h1 { font-size: 1.2rem; }
    .container { padding: 12px 12px 80px; }
    .lined-paper { padding: 16px; }
    .english-display { font-size: 0.95rem; }
    .self-assess { flex-direction: column; }
    .assess-btn { min-width: auto; }
    .stage-tab { padding: 10px 4px; font-size: 0.72rem; }
    .blank-input { min-width: 60px; font-size: 0.85rem; }
  }

  /* Reset button */
  .reset-area {
    text-align: center;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--line-faint);
  }
  .reset-btn {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover {
    background: var(--red-light);
  }
</style>
</head>
<body>

<div class="header">
  <h1>앵두의 번역 릴레이 연습장</h1>
  <div class="subtitle">문장 번역 릴레이 &middot; TOEIC 핵심 문장 15선</div>
  <div class="progress-bar-container">
    <div class="progress-bar-fill" id="progressBarFill"></div>
  </div>
  <div class="progress-text" id="progressText">15문장 중 0문장 완료</div>
</div>

<div class="container">

  <!-- Goal Tracker -->
  <div class="goal-tracker">
    <div>
      <div class="label">오늘의 목표</div>
      <div class="count" id="goalCount">0 / 5 문장</div>
    </div>
    <div class="goal-dots" id="goalDots">
      <div class="goal-dot"></div>
      <div class="goal-dot"></div>
      <div class="goal-dot"></div>
      <div class="goal-dot"></div>
      <div class="goal-dot"></div>
    </div>
  </div>

  <!-- Sentence List -->
  <div class="sentence-list">
    <div class="sentence-list-header" id="listHeader" onclick="toggleList()">
      <span>문장 목록</span>
      <span class="toggle-icon">&#9660;</span>
    </div>
    <div class="sentence-items" id="sentenceItems"></div>
  </div>

  <!-- Exercise Area -->
  <div class="exercise-area" id="exerciseArea">
    <!-- Stage Tabs -->
    <div class="stage-tabs">
      <div class="stage-tab" data-stage="1" onclick="switchStage(1)">
        Stage 1
        <span class="tab-label">영 &rarr; 한</span>
      </div>
      <div class="stage-tab" data-stage="2" onclick="switchStage(2)">
        Stage 2
        <span class="tab-label">한 &rarr; 영</span>
      </div>
      <div class="stage-tab" data-stage="3" onclick="switchStage(3)">
        Stage 3
        <span class="tab-label">빈칸 채우기</span>
      </div>
    </div>

    <!-- Stage 1: English to Korean -->
    <div class="card" id="stage1" style="display:none;">
      <div class="lined-paper">
        <div class="sentence-number-badge" id="s1Badge"></div>
        <div class="english-display" id="s1English"></div>
        <div class="vocab-list" id="s1Vocab"></div>
        <div class="reveal-section">
          <button class="btn btn-primary btn-block" id="s1RevealBtn" onclick="revealKorean()">해석 보기</button>
          <div class="korean-translation" id="s1Korean"></div>
        </div>
        <div class="self-assess" id="s1Assess" style="display:none;">
          <button class="assess-btn" onclick="selfAssess(1, 'good')">완벽히 해석했어요</button>
          <button class="assess-btn" onclick="selfAssess(1, 'ok')">일부만 이해했어요</button>
          <button class="assess-btn" onclick="selfAssess(1, 'bad')">거의 못했어요</button>
        </div>
      </div>
    </div>

    <!-- Stage 2: Korean to English -->
    <div class="card" id="stage2" style="display:none;">
      <div class="lined-paper">
        <div class="sentence-number-badge" id="s2Badge"></div>
        <div class="korean-display" id="s2Korean"></div>
        <textarea class="writing-area" id="s2Input" placeholder="영어로 문장을 작성해보세요..."></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" id="s2RevealBtn" onclick="revealEnglish()">정답 보기</button>
        </div>
        <div class="comparison" id="s2Comparison">
          <div class="comparison-box mine">

/* ── State ── */
var currentSentence = null;
var currentStage = 1;
var progress = {};
var STORAGE_KEY = 'angdu_translation_relay_v2';

/* ── Persistence ── */
function loadProgress() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) progress = JSON.parse(saved);
  } catch (e) {}
  if (!progress || typeof progress !== 'object') progress = {};
  sentences.forEach(function(s) {
    if (!progress[s.id]) progress[s.id] = { stage1: false, stage2: false, stage3: false };
  });
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch (e) {}
}

/* ── Helpers ── */
function getCompletedCount() {
  return sentences.filter(function(s) {
    var p = progress[s.id];
    return p && p.stage1 && p.stage2 && p.stage3;
  }).length;
}
function starSVG() {
  return '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
}
function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function escapeHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ── Render Sentence List ── */
function renderSentenceList() {
  var container = document.getElementById('sentenceItems');
  container.innerHTML = '';
  sentences.forEach(function(s) {
    var div = document.createElement('div');
    div.className = 'sentence-item' + (currentSentence && currentSentence.id === s.id ? ' active' : '');
    var p = progress[s.id] || {};
    div.innerHTML =
      '<span class="num">' + s.id + '</span>' +
      '<span class="preview">' + s.en + '</span>' +
      '<span class="stars">' +
        '<span class="star ' + (p.stage1 ? 'filled' : 'empty') + '">' + starSVG() + '</span>' +
        '<span class="star ' + (p.stage2 ? 'filled' : 'empty') + '">' + starSVG() + '</span>' +
        '<span class="star ' + (p.stage3 ? 'filled' : 'empty') + '">' + starSVG() + '</span>' +
      '</span>';
    div.onclick = (function(id) { return function() { selectSentence(id); }; })(s.id);
    container.appendChild(div);
  });
}

/* ── Header / Progress ── */
function updateHeader() {
  var completed = getCompletedCount();
  document.getElementById('progressText').textContent = '15\ubb38\uc7a5 \uc911 ' + completed + '\ubb38\uc7a5 \uc644\ub8cc';
  document.getElementById('progressBarFill').style.width = ((completed / 15) * 100) + '%';
  document.getElementById('goalCount').textContent = Math.min(completed, 5) + ' / 5 \ubb38\uc7a5';
  var dots = document.querySelectorAll('.goal-dot');
  dots.forEach(function(d, i) {
    d.className = 'goal-dot' + (i < completed ? ' filled' : '');
  });
}

/* ── Stage Tabs ── */
function updateStageTabs() {
  if (!currentSentence) return;
  var p = progress[currentSentence.id];
  document.querySelectorAll('.stage-tab').forEach(function(tab) {
    var stage = parseInt(tab.dataset.stage);
    tab.className = 'stage-tab';
    if (stage === currentStage) tab.classList.add('active');
    if ((stage === 1 && p.stage1) || (stage === 2 && p.stage2) || (stage === 3 && p.stage3)) {
      tab.classList.add('completed');
    }
  });
}

/* ── Select Sentence ── */
function selectSentence(id) {
  currentSentence = sentences.find(function(s) { return s.id === id; });
  currentStage = 1;
  document.getElementById('exerciseArea').classList.add('visible');
  renderSentenceList();
  updateStageTabs();
  renderStage();
  updateNavButtons();
  document.getElementById('exerciseArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function switchStage(stage) {
  currentStage = stage;
  updateStageTabs();
  renderStage();
}

function renderStage() {
  document.getElementById('stage1').style.display = 'none';
  document.getElementById('stage2').style.display = 'none';
  document.getElementById('stage3').style.display = 'none';
  if (currentStage === 1) renderStage1();
  else if (currentStage === 2) renderStage2();
  else if (currentStage === 3) renderStage3();
}

/* ── Stage 1: English -> Korean ── */
function renderStage1() {
  var s = currentSentence;
  document.getElementById('stage1').style.display = 'block';
  document.getElementById('s1Badge').textContent = '\ubb38\uc7a5 ' + s.id + ' / 15';

  // Highlight keywords (longest first to avoid partial matches)
  var html = s.en;
  var sortedKeys = Object.keys(s.keywords).sort(function(a, b) { return b.length - a.length; });
  var placeholders = [];
  sortedKeys.forEach(function(key, ki) {
    var regex = new RegExp('(' + escapeRegex(key) + ')', 'gi');
    html = html.replace(regex, function(match) {
      var ph = '\x00PH' + ki + '_' + placeholders.length + '\x00';
      placeholders.push({
        ph: ph,
        replacement: '<span class="keyword">' + match + '<span class="tooltip">' + s.keywords[key] + '</span></span>'
      });
      return ph;
    });
  });
  placeholders.forEach(function(item) {
    html = html.replace(item.ph, item.replacement);
  });
  document.getElementById('s1English').innerHTML = html;

  // Vocab chips
  var vocabHtml = '';
  Object.keys(s.keywords).forEach(function(en) {
    vocabHtml += '<span class="vocab-chip"><span class="en">' + en + '</span> ' + s.keywords[en] + '</span>';
  });
  document.getElementById('s1Vocab').innerHTML = vocabHtml;

  // Reset state
  document.getElementById('s1Korean').textContent = s.ko;
  document.getElementById('s1Korean').classList.remove('visible');
  document.getElementById('s1RevealBtn').style.display = 'block';
  document.getElementById('s1Assess').style.display = 'none';
  resetAssessButtons('s1Assess');
}

function revealKorean() {
  document.getElementById('s1Korean').classList.add('visible');
  document.getElementById('s1RevealBtn').style.display = 'none';
  document.getElementById('s1Assess').style.display = 'flex';
}

/* ── Stage 2: Korean -> English ── */
function renderStage2() {
  var s = currentSentence;
  document.getElementById('stage2').style.display = 'block';
  document.getElementById('s2Badge').textContent = '\ubb38\uc7a5 ' + s.id + ' / 15';
  document.getElementById('s2Korean').textContent = s.ko;
  document.getElementById('s2Input').value = '';
  document.getElementById('s2Comparison').classList.remove('visible');
  document.getElementById('s2RevealBtn').style.display = 'inline-flex';
  document.getElementById('s2Assess').style.display = 'none';
  resetAssessButtons('s2Assess');
}

function revealEnglish() {
  var s = currentSentence;
  var myAnswer = document.getElementById('s2Input').value.trim();
  document.getElementById('s2MyAnswer').textContent = myAnswer || '(\uc791\uc131\ud558\uc9c0 \uc54a\uc74c)';
  document.getElementById('s2CorrectAnswer').textContent = s.en;
  document.getElementById('s2Comparison').classList.add('visible');
  document.getElementById('s2RevealBtn').style.display = 'none';
  document.getElementById('s2Assess').style.display = 'flex';
}

/* ── Stage 3: Fill in the Blanks ── */
function renderStage3() {
  var s = currentSentence;
  document.getElementById('stage3').style.display = 'block';
  document.getElementById('s3Badge').textContent = '\ubb38\uc7a5 ' + s.id + ' / 15';
  document.getElementById('s3Result').className = 'result-msg';
  document.getElementById('s3Result').style.display = 'none';

  // Build sentence with blanks
  var template = s.template;
  var blankIndex = 0;
  var html = '';
  var i = 0;
  while (i < template.length) {
    if (template[i] === '[') {
      var end = template.indexOf(']', i);
      if (end !== -1) {
        var word = template.substring(i + 1, end);
        var inputWidth = Math.max(word.length * 11, 80);
        html += '<input type="text" class="blank-input" data-answer="' + escapeHtml(word) + '" data-index="' + blankIndex + '" style="width:' + inputWidth + 'px" placeholder="?" autocomplete="off" autocapitalize="off" spellcheck="false">';
        blankIndex++;
        i = end + 1;
      } else {
        html += template[i];
        i++;
      }
    } else {
      html += template[i];
      i++;
    }
  }
  document.getElementById('s3Blanks').innerHTML = html;

  // Hints: first letter + underscores
  var hintsHtml = '';
  s.blanks.forEach(function(b) {
    var underscores = '';
    for (var j = 0; j < Math.max(b.length - 1, 1); j++) underscores += '_';
    hintsHtml += '<span class="hint-tag">' + b[0] + underscores + '</span>';
  });
  document.getElementById('s3Hints').innerHTML = hintsHtml;
  document.getElementById('s3Hints').classList.remove('visible');

  // Enter key advances to next blank or checks
  setTimeout(function() {
    var inputs = document.querySelectorAll('#s3Blanks .blank-input');
    inputs.forEach(function(inp, idx) {
      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (idx < inputs.length - 1) inputs[idx + 1].focus();
          else checkBlanks();
        }
      });
    });
    if (inputs.length > 0) inputs[0].focus();
  }, 100);
}

function showHints() {
  document.getElementById('s3Hints').classList.add('visible');
}

function checkBlanks() {
  var inputs = document.querySelectorAll('#s3Blanks .blank-input');
  var correct = 0;
  var total = inputs.length;

  inputs.forEach(function(inp) {
    var answer = inp.dataset.answer;
    var userVal = inp.value.trim();

    // Remove any previous correction label
    var next = inp.nextElementSibling;
    if (next && next.classList && next.classList.contains('correct-answer-label')) {
      next.remove();
    }

    if (userVal.toLowerCase() === answer.toLowerCase()) {
      inp.classList.remove('wrong');
      inp.classList.add('correct');
      inp.value = answer;
      correct++;
    } else {
      inp.classList.remove('correct');
      inp.classList.add('wrong');
      // Show correct answer beside wrong input
      var label = document.createElement('span');
      label.className = 'correct-answer-label';
      label.textContent = ' ' + answer;
      inp.parentNode.insertBefore(label, inp.nextSibling);
    }
  });

  var resultEl = document.getElementById('s3Result');
  resultEl.style.display = 'block';
  if (correct === total) {
    resultEl.className = 'result-msg visible perfect';
    resultEl.textContent = '\uc644\ubcbd\ud574\uc694! ' + total + '\uac1c \ubaa8\ub450 \uc815\ub2f5\uc785\ub2c8\ub2e4!';
    completeStage(3);
  } else {
    resultEl.className = 'result-msg visible partial';
    resultEl.textContent = total + '\uac1c \uc911 ' + correct + '\uac1c \uc815\ub2f5! \ud2c0\ub9b0 \ub2e8\uc5b4\ub97c \ub2e4\uc2dc \ud655\uc778\ud574\ubcf4\uc138\uc694.';
    if (correct >= Math.ceil(total * 0.5)) {
      completeStage(3);
    }
  }
}

/* ── Self Assessment ── */
function selfAssess(stage, level) {
  var containerId = stage === 1 ? 's1Assess' : 's2Assess';
  var btns = document.querySelectorAll('#' + containerId + ' .assess-btn');
  btns.forEach(function(b) { b.className = 'assess-btn'; });

  var classMap = { 'good': 'selected-good', 'ok': 'selected-ok', 'bad': 'selected-bad' };
  var levels = ['good', 'ok', 'bad'];
  var idx = levels.indexOf(level);
  if (idx >= 0 && btns[idx]) btns[idx].classList.add(classMap[level]);

  completeStage(stage);
}

function resetAssessButtons(containerId) {
  document.querySelectorAll('#' + containerId + ' .assess-btn').forEach(function(b) {
    b.className = 'assess-btn';
  });
}

/* ── Complete Stage ── */
function completeStage(stage) {
  if (!currentSentence) return;
  progress[currentSentence.id]['stage' + stage] = true;
  saveProgress();
  updateStageTabs();
  updateHeader();
  renderSentenceList();
}

/* ── Navigation ── */
function navigate(dir) {
  if (!currentSentence) return;
  var idx = sentences.findIndex(function(s) { return s.id === currentSentence.id; });
  var newIdx = idx + dir;
  if (newIdx >= 0 && newIdx < sentences.length) {
    selectSentence(sentences[newIdx].id);
  }
}
function updateNavButtons() {
  if (!currentSentence) return;
  var idx = sentences.findIndex(function(s) { return s.id === currentSentence.id; });
  document.getElementById('prevBtn').disabled = (idx === 0);
  document.getElementById('nextBtn').disabled = (idx === sentences.length - 1);
}

/* ── Toggle List ── */
function toggleList() {
  document.getElementById('sentenceItems').classList.toggle('collapsed');
  document.getElementById('listHeader').classList.toggle('collapsed');
}

/* ── Reset ── */
function resetAll() {
  if (confirm('\ubaa8\ub4e0 \uc9c4\ud589 \uc0c1\ud669\uc744 \ucd08\uae30\ud654\ud558\uc2dc\uaca0\uc2b5\ub2c8\uae4c?')) {
    localStorage.removeItem(STORAGE_KEY);
    progress = {};
    loadProgress();
    currentSentence = null;
    currentStage = 1;
    document.getElementById('exerciseArea').classList.remove('visible');
    renderSentenceList();
    updateHeader();
  }
}

/* ── Init ── */
loadProgress();
renderSentenceList();
updateHeader();
</script>
