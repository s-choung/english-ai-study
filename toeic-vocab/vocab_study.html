<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앵두의 TOEIC 단어장</title>
<style>
:root {
  --bg: #faf8f5;
  --bg-card: #ffffff;
  --bg-secondary: #f3f0eb;
  --text: #2d2a26;
  --text-secondary: #6b6560;
  --accent: #c0785c;
  --accent-light: #e8c4b4;
  --accent-dark: #9e5a3e;
  --border: #e6e0d8;
  --success: #5a9e6f;
  --warning: #d4a34a;
  --danger: #c45c5c;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg: #1a1816;
  --bg-card: #252220;
  --bg-secondary: #2d2a26;
  --text: #e8e0d8;
  --text-secondary: #9e958c;
  --accent: #d4956e;
  --accent-light: #5c3d2e;
  --accent-dark: #e8b090;
  --border: #3d3832;
  --shadow: 0 2px 12px rgba(0,0,0,0.2);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--accent-light); border-radius: 3px; }

/* Header */
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.logo {
  font-size: 1.4em;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-cherry {
  font-size: 1.2em;
}

/* Nav */
.nav {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.nav-btn {
  padding: 8px 16px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: var(--radius-sm);
  font-size: 0.9em;
  font-weight: 500;
  transition: all var(--transition);
  white-space: nowrap;
}
.nav-btn:hover { background: var(--bg-secondary); color: var(--text); }
.nav-btn.active { background: var(--accent); color: white; }

/* Theme toggle */
.theme-toggle {
  width: 40px;
  height: 40px;
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1em;
  transition: all var(--transition);
}
.theme-toggle:hover { background: var(--accent-light); }

/* Main content */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

.page { display: none; }
.page.active { display: block; }

/* Dashboard */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  transition: transform var(--transition);
}
.stat-card:hover { transform: translateY(-2px); }
.stat-label {
  font-size: 0.85em;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.stat-value {
  font-size: 2em;
  font-weight: 700;
  color: var(--accent);
}
.stat-sub {
  font-size: 0.8em;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* Progress bar */
.progress-bar {
  background: var(--bg-secondary);
  border-radius: 20px;
  height: 12px;
  overflow: hidden;
  margin: 8px 0;
}
.progress-fill {
  height: 100%;
  border-radius: 20px;
  transition: width 0.5s ease;
  background: linear-gradient(90deg, var(--accent), var(--accent-dark));
}
.progress-fill.green { background: linear-gradient(90deg, #5a9e6f, #3d7a4f); }
.progress-fill.orange { background: linear-gradient(90deg, #d4a34a, #b8892e); }

/* Part stats */
.part-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-top: 16px;
}
.part-stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  text-align: center;
}
.part-stat-card h3 {
  font-size: 1em;
  color: var(--accent);
  margin-bottom: 8px;
}
.part-stat-card .count {
  font-size: 1.5em;
  font-weight: 700;
}

/* Controls */
.controls {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  box-shadow: var(--shadow);
}
.search-input {
  flex: 1;
  min-width: 200px;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-size: 0.95em;
  outline: none;
  transition: border-color var(--transition);
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-secondary); }

select, .btn {
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-size: 0.9em;
  cursor: pointer;
  outline: none;
  transition: all var(--transition);
}
select:focus, .btn:focus { border-color: var(--accent); }
.btn { font-weight: 500; }
.btn:hover { background: var(--bg-secondary); }
.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
.btn-success { background: var(--success); color: white; border-color: var(--success); }
.btn-success:hover { opacity: 0.9; }
.btn-warning { background: var(--warning); color: white; border-color: var(--warning); }
.btn-warning:hover { opacity: 0.9; }
.btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
.btn-danger:hover { opacity: 0.9; }
.btn-sm { padding: 6px 12px; font-size: 0.85em; }

/* Word list */
.word-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}
.word-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.word-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
  border-color: var(--accent-light);
}
.word-card .word-title {
  font-size: 1.15em;
  font-weight: 600;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.word-card .word-ko {
  color: var(--text-secondary);
  font-size: 0.95em;
  margin-bottom: 8px;
}
.word-card .word-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}

/* Badge */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.75em;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.badge-basic { background: #e8f5e9; color: #2e7d32; }
.badge-intermediate { background: #fff3e0; color: #e65100; }
.badge-advanced { background: #ffebee; color: #c62828; }
[data-theme="dark"] .badge-basic { background: #1b3a1e; color: #6fcf7c; }
[data-theme="dark"] .badge-intermediate { background: #3a2a10; color: #ffa726; }
[data-theme="dark"] .badge-advanced { background: #3a1515; color: #ef7070; }

.badge-part {
  background: var(--accent-light);
  color: var(--accent-dark);
  font-size: 0.72em;
}
.badge-pos {
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-size: 0.72em;
}

/* Status indicator */
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.status-new { background: #bbb; }
.status-learning { background: var(--warning); }
.status-mastered { background: var(--success); }

/* Word detail modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-card);
  border-radius: var(--radius);
  max-width: 600px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.3s ease;
}
@keyframes modalIn {
  from { transform: translateY(20px) scale(0.95); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}
.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  position: sticky;
  top: 0;
  background: var(--bg-card);
  z-index: 1;
}
.modal-close {
  width: 32px;
  height: 32px;
  border: none;
  background: var(--bg-secondary);
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.1em;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: all var(--transition);
  flex-shrink: 0;
}
.modal-close:hover { background: var(--danger); color: white; }
.modal-body { padding: 20px 24px; }
.modal-body .section {
  margin-bottom: 16px;
}
.modal-body .section-label {
  font-size: 0.8em;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  font-weight: 600;
}
.modal-body .section-content {
  font-size: 1em;
  line-height: 1.7;
}
.modal-body .context-sentence {
  background: var(--bg-secondary);
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent);
  font-style: italic;
  margin-bottom: 8px;
}
.modal-body .context-sentence b { color: var(--accent); font-style: normal; }
.modal-word {
  font-size: 1.8em;
  font-weight: 700;
  color: var(--accent);
}
.modal-word-ko {
  font-size: 1.1em;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* Flashcard */
.flashcard-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
}
.flashcard-progress {
  text-align: center;
  margin-bottom: 16px;
  color: var(--text-secondary);
  font-size: 0.95em;
}
.flashcard-wrapper {
  width: 100%;
  max-width: 500px;
  height: 360px;
  perspective: 1000px;
  margin-bottom: 24px;
  cursor: pointer;
}
.flashcard {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  background: var(--bg-card);
}
.flashcard-back {
  transform: rotateY(180deg);
  text-align: center;
  overflow-y: auto;
  justify-content: flex-start;
  padding-top: 24px;
}
.flashcard-front .fc-word {
  font-size: 2.2em;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
  text-align: center;
}
.flashcard-front .fc-pos {
  font-size: 0.95em;
  color: var(--text-secondary);
}
.flashcard-front .fc-hint {
  margin-top: 16px;
  font-size: 0.85em;
  color: var(--text-secondary);
  opacity: 0.6;
}
.flashcard-back .fc-back-word {
  font-size: 1.5em;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
}
.flashcard-back .fc-back-ko {
  font-size: 1.2em;
  margin-bottom: 8px;
}
.flashcard-back .fc-back-en {
  font-size: 0.9em;
  color: var(--text-secondary);
  margin-bottom: 12px;
  padding: 0 16px;
}
.flashcard-back .fc-back-context {
  background: var(--bg-secondary);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.85em;
  font-style: italic;
  margin: 0 8px 8px;
  text-align: left;
  width: calc(100% - 16px);
  border-left: 3px solid var(--accent);
}
.flashcard-back .fc-back-context b { color: var(--accent); font-style: normal; }
.flashcard-back .fc-back-context-ko {
  font-size: 0.82em;
  color: var(--text-secondary);
  margin: 0 8px 12px;
  text-align: left;
  width: calc(100% - 16px);
}
.flashcard-back .fc-back-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.flashcard-buttons {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
.flashcard-nav {
  display: flex;
  gap: 12px;
  align-items: center;
}
.flashcard-nav .btn { min-width: 44px; }

/* Flashcard controls panel */
.fc-controls {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
}

/* Quiz */
.quiz-container {
  max-width: 600px;
  margin: 0 auto;
}
.quiz-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow-lg);
  margin-bottom: 20px;
}
.quiz-question {
  font-size: 1.5em;
  font-weight: 700;
  text-align: center;
  margin-bottom: 8px;
  color: var(--accent);
}
.quiz-sub {
  text-align: center;
  color: var(--text-secondary);
  margin-bottom: 24px;
  font-size: 0.9em;
}
.quiz-options {
  display: grid;
  gap: 10px;
}
.quiz-option {
  padding: 14px 20px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  cursor: pointer;
  font-size: 1em;
  text-align: left;
  transition: all var(--transition);
  color: var(--text);
}
.quiz-option:hover:not(.disabled) {
  border-color: var(--accent);
  background: var(--accent-light);
}
.quiz-option.correct {
  border-color: var(--success);
  background: #e8f5e9;
  color: #2e7d32;
}
[data-theme="dark"] .quiz-option.correct {
  background: #1b3a1e;
  color: #6fcf7c;
}
.quiz-option.wrong {
  border-color: var(--danger);
  background: #ffebee;
  color: #c62828;
}
[data-theme="dark"] .quiz-option.wrong {
  background: #3a1515;
  color: #ef7070;
}
.quiz-option.disabled { cursor: default; }
.quiz-feedback {
  margin-top: 16px;
  padding: 16px;
  border-radius: var(--radius-sm);
  display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct-fb {
  background: #e8f5e9;
  border: 1px solid #c8e6c9;
}
[data-theme="dark"] .quiz-feedback.correct-fb {
  background: #1b3a1e;
  border-color: #2e5432;
}
.quiz-feedback.wrong-fb {
  background: #ffebee;
  border: 1px solid #ffcdd2;
}
[data-theme="dark"] .quiz-feedback.wrong-fb {
  background: #3a1515;
  border-color: #5a2020;
}
#quizConfusedBtn { transition: all var(--transition); }
#quizConfusedBtn:hover { opacity: 0.85; }
#quizConfusedBtn.confused-marked { background: var(--text-secondary) !important; cursor: default; }
.quiz-score {
  text-align: center;
  padding: 16px;
  font-size: 1.1em;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.quiz-score b { color: var(--accent); font-size: 1.3em; }

/* Quiz setup */
.quiz-setup {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 500px;
  margin: 0 auto;
  box-shadow: var(--shadow-lg);
}
.quiz-setup h2 {
  text-align: center;
  margin-bottom: 24px;
  color: var(--accent);
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  margin-bottom: 6px;
  font-weight: 500;
  font-size: 0.9em;
}
.form-group select, .form-group input {
  width: 100%;
}

/* Quiz summary */
.quiz-summary {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  box-shadow: var(--shadow-lg);
}
.quiz-summary h2 { color: var(--accent); margin-bottom: 16px; }
.quiz-summary .big-score {
  font-size: 3em;
  font-weight: 700;
  color: var(--accent);
  margin: 16px 0;
}
.quiz-summary .score-detail {
  color: var(--text-secondary);
  margin-bottom: 24px;
}
.wrong-list {
  text-align: left;
  margin-top: 16px;
}
.wrong-list h3 {
  margin-bottom: 12px;
  color: var(--danger);
}
.wrong-item {
  background: var(--bg-secondary);
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  border-left: 3px solid var(--danger);
}
.wrong-item .wi-word {
  font-weight: 600;
  color: var(--accent);
}
.wrong-item .wi-meaning {
  font-size: 0.9em;
  color: var(--text-secondary);
}

/* Progress page */
.progress-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.progress-section h2 {
  color: var(--accent);
  margin-bottom: 16px;
  font-size: 1.2em;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-secondary);
}
.empty-state .empty-icon {
  font-size: 3em;
  margin-bottom: 12px;
  opacity: 0.4;
}

/* Count badge */
.count-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
  height: 24px;
  padding: 0 8px;
  border-radius: 12px;
  background: var(--accent);
  color: white;
  font-size: 0.75em;
  font-weight: 600;
  margin-left: 4px;
}

/* Pagination */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.pagination .btn { min-width: 40px; }

/* Responsive */
@media (max-width: 768px) {
  .header-inner { flex-direction: column; align-items: flex-start; }
  .nav { width: 100%; overflow-x: auto; }
  .main { padding: 16px; }
  .word-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .flashcard-wrapper { height: 320px; }
  .flashcard-front .fc-word { font-size: 1.6em; }
  .controls { flex-direction: column; }
  .search-input { width: 100%; }
}

@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr; }
  .flashcard-wrapper { height: 300px; max-width: 100%; }
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.3s ease; }

/* Word count info */
.word-count-info {
  color: var(--text-secondary);
  font-size: 0.9em;
  margin-bottom: 12px;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-cherry">&#127826;</span>

// ============== STATE ==============
const STORAGE_KEY = 'toeic_vocab_progress_v2';
let progress = loadProgress();
let currentPage = 'dashboard';
let wordListPage = 0;
const WORDS_PER_PAGE = 30;

// Flashcard state
let fcWords = [];
let fcIndex = 0;
let fcFlipped = false;

// Quiz state
let quizWords = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizWrong = [];
let quizConfused = [];
let quizAnswered = false;
let quizType = 'en-to-ko';

// ============== PROGRESS ==============
function loadProgress() {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return data || {};
  } catch { return {}; }
}
function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}
function getWordStatus(id) {
  return progress[id] || 'new';
}
function setWordStatus(id, status) {
  progress[id] = status;
  saveProgress();
}

// ============== THEME ==============
function initTheme() {
  const saved = localStorage.getItem('toeic_theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  updateThemeIcon();
}
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('toeic_theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('toeic_theme', 'dark');
  }
  updateThemeIcon();
}
function updateThemeIcon() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('themeToggle').innerHTML = isDark ? '&#9728;' : '&#9790;';
}

// ============== NAVIGATION ==============
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-page="' + page + '"]').classList.add('active');
  if (page === 'dashboard') renderDashboard();
  else if (page === 'wordlist') renderWordList();
  else if (page === 'progress') renderProgress();
}

// ============== DASHBOARD ==============
function renderDashboard() {
  const total = ALL_WORDS.length;
  const studied = ALL_WORDS.filter(w => getWordStatus(w.id) === 'learning').length;
  const mastered = ALL_WORDS.filter(w => getWordStatus(w.id) === 'mastered').length;
  const newCount = total - studied - mastered;
  const progressPct = total > 0 ? Math.round(((studied + mastered) / total) * 100) : 0;

  document.getElementById('dashStats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">&#128218; 전체 단어 Total</div>
      <div class="stat-value">${total}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">&#11088; New (미학습)</div>
      <div class="stat-value" style="color:var(--text-secondary)">${newCount}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">&#128161; Learning (학습 중)</div>
      <div class="stat-value" style="color:var(--warning)">${studied}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">&#9989; Mastered (숙달)</div>
      <div class="stat-value" style="color:var(--success)">${mastered}</div>
    </div>
  `;

  const fill = document.getElementById('overallProgress');
  fill.style.width = progressPct + '%';
  fill.className = 'progress-fill' + (progressPct >= 80 ? ' green' : progressPct >= 40 ? ' orange' : '');
  document.getElementById('overallProgressText').textContent =
    `${studied + mastered} / ${total} 단어 학습 완료 (${progressPct}%)`;

  const parts = ['Part 3', 'Part 4', 'Part 5', 'Part 6', 'Part 7'];
  document.getElementById('partStats').innerHTML = parts.map(p => {
    const pw = ALL_WORDS.filter(w => w.part === p);
    const pm = pw.filter(w => getWordStatus(w.id) === 'mastered').length;
    const pl = pw.filter(w => getWordStatus(w.id) === 'learning').length;
    const pct = pw.length > 0 ? Math.round(((pm + pl) / pw.length) * 100) : 0;
    return `<div class="part-stat-card">
      <h3>${p}</h3>
      <div class="count">${pw.length}</div>
      <div style="font-size:0.8em;color:var(--text-secondary);margin-top:4px;">
        <span style="color:var(--success);">${pm} 숙달</span> /
        <span style="color:var(--warning);">${pl} 학습 중</span>
      </div>
      <div class="progress-bar" style="margin-top:8px;">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>`;
  }).join('');
}

// ============== WORD LIST ==============
function getFilteredWords() {
  let words = [...ALL_WORDS];
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const partF = document.getElementById('filterPart').value;
  const diffF = document.getElementById('filterDiff').value;
  const statusF = document.getElementById('filterStatus').value;
  const sortF = document.getElementById('sortBy').value;

  if (search) {
    words = words.filter(w =>
      w.word.toLowerCase().includes(search) ||
      w.meaning_ko.includes(search) ||
      w.meaning_en.toLowerCase().includes(search)
    );
  }
  if (partF !== 'all') words = words.filter(w => w.part === partF);
  if (diffF !== 'all') words = words.filter(w => w.difficulty === diffF);
  if (statusF !== 'all') words = words.filter(w => getWordStatus(w.id) === statusF);

  const diffOrder = { basic: 0, intermediate: 1, advanced: 2 };
  if (sortF === 'alpha') words.sort((a, b) => a.word.localeCompare(b.word));
  else if (sortF === 'alpha-desc') words.sort((a, b) => b.word.localeCompare(a.word));
  else if (sortF === 'question') words.sort((a, b) => a.question_number - b.question_number);
  else if (sortF === 'difficulty') words.sort((a, b) => (diffOrder[a.difficulty]||0) - (diffOrder[b.difficulty]||0));

  return words;
}

function renderWordList() {
  const words = getFilteredWords();
  const totalPages = Math.ceil(words.length / WORDS_PER_PAGE);
  if (wordListPage >= totalPages) wordListPage = Math.max(0, totalPages - 1);

  const start = wordListPage * WORDS_PER_PAGE;
  const pageWords = words.slice(start, start + WORDS_PER_PAGE);

  document.getElementById('wordCountInfo').textContent =
    `${words.length}개 단어 (전체 ${ALL_WORDS.length}개 중)`;

  const grid = document.getElementById('wordGrid');
  grid.innerHTML = pageWords.map(w => {
    const status = getWordStatus(w.id);
    const statusClass = 'status-' + status;
    return `<div class="word-card fade-in" onclick="openModal(${w.id})">
      <div class="word-title">
        <span class="status-dot ${statusClass}"></span>
        ${escHtml(w.word)}
      </div>
      <div class="word-ko">${escHtml(w.meaning_ko)}</div>
      <div class="word-meta">
        <span class="badge badge-${w.difficulty}">${w.difficulty}</span>
        <span class="badge badge-part">${w.part}</span>
        <span class="badge badge-pos">${escHtml(w.pos)}</span>
        <span style="font-size:0.75em;color:var(--text-secondary);">Q${w.question_number}</span>
      </div>
    </div>`;
  }).join('');

  // Pagination
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let pagHtml = `<button class="btn btn-sm" ${wordListPage === 0 ? 'disabled' : ''} onclick="wordListPage--;renderWordList();">&#9664;</button>`;
  const maxShow = 5;
  let pStart = Math.max(0, wordListPage - Math.floor(maxShow/2));
  let pEnd = Math.min(totalPages, pStart + maxShow);
  if (pEnd - pStart < maxShow) pStart = Math.max(0, pEnd - maxShow);
  for (let i = pStart; i < pEnd; i++) {
    pagHtml += `<button class="btn btn-sm ${i === wordListPage ? 'btn-primary' : ''}" onclick="wordListPage=${i};renderWordList();">${i+1}</button>`;
  }
  pagHtml += `<button class="btn btn-sm" ${wordListPage >= totalPages-1 ? 'disabled' : ''} onclick="wordListPage++;renderWordList();">&#9654;</button>`;
  pag.innerHTML = pagHtml;
}

// ============== MODAL ==============

  const w = ALL_WORDS.find(x => x.id === id);
  if (!w) return;
  const status = getWordStatus(w.id);

  document.getElementById('modalWord').textContent = w.word;
  document.getElementById('modalKo').textContent = w.meaning_ko;

  // Highlight word in context
  let ctxHtml = escHtml(w.context);

  ctxHtml = ctxHtml.replace(re, '<b>$1</b>');

  document.getElementById('modalBody').innerHTML = `
    <div class="section">
      <div class="section-label">품사 Part of Speech</div>
      <div class="section-content">${escHtml(w.pos)}</div>
    </div>
    <div class="section">
      <div class="section-label">영어 뜻 English Definition</div>
      <div class="section-content">${escHtml(w.meaning_en)}</div>
    </div>
    <div class="section">
      <div class="section-label">예문 Context Sentence</div>
      <div class="context-sentence">${ctxHtml}</div>
      <div style="font-size:0.9em;color:var(--text-secondary);margin-top:4px;">${escHtml(w.context_meaning)}</div>
    </div>
    <div class="section" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <span class="badge badge-${w.difficulty}">${w.difficulty}</span>

        <button class="btn btn-sm ${status==='learning' ? 'btn-warning' : ''}" onclick="setWordStatus(${w.id},'learning');openModal(${w.id});refreshIfNeeded();">Learning</button>
        <button class="btn btn-sm ${status==='mastered' ? 'btn-success' : ''}" onclick="setWordStatus(${w.id},'mastered');openModal(${w.id});refreshIfNeeded();">Mastered</button>

  document.getElementById('modalOverlay').classList.add('active');

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}
function refreshIfNeeded() {
  if (currentPage === 'dashboard') renderDashboard();
  else if (currentPage === 'wordlist') renderWordList();
  else if (currentPage === 'progress') renderProgress();
}

// ============== FLASHCARD ==============
function startFlashcards() {
  const partF = document.getElementById('fcPartFilter').value;
  const statusF = document.getElementById('fcStatusFilter').value;

  let words = [...ALL_WORDS];
  if (partF !== 'all') words = words.filter(w => w.part === partF);
  if (statusF === 'new') words = words.filter(w => getWordStatus(w.id) === 'new');
  else if (statusF === 'learning') words = words.filter(w => getWordStatus(w.id) === 'learning');
  else if (statusF === 'new+learning') words = words.filter(w => {
    const s = getWordStatus(w.id);
    return s === 'new' || s === 'learning';
  });

  if (words.length === 0) {
    document.getElementById('fcContainer').style.display = 'none';
    document.getElementById('fcEmpty').style.display = 'block';
    return;
  }

  fcWords = words;
  fcIndex = 0;
  fcFlipped = false;
  document.getElementById('fcContainer').style.display = 'flex';
  document.getElementById('fcEmpty').style.display = 'none';
  renderFlashcard();
}

function shuffleFC() {
  for (let i = fcWords.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcWords[i], fcWords[j]] = [fcWords[j], fcWords[i]];
  }
  fcIndex = 0;
  fcFlipped = false;
  renderFlashcard();
}

function renderFlashcard() {
  if (fcWords.length === 0) return;
  const w = fcWords[fcIndex];
  fcFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');

  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcPos').textContent = w.pos;
  document.getElementById('fcProgress').textContent = `${fcIndex + 1} / ${fcWords.length}`;
  document.getElementById('fcNavInfo').textContent = `${fcIndex + 1} of ${fcWords.length}`;

  // Build back
  let ctxHtml = escHtml(w.context);
  const re = new RegExp('(' + escRegex(w.word) + ')', 'gi');
  ctxHtml = ctxHtml.replace(re, '<b>$1</b>');

  document.getElementById('fcBack').innerHTML = `
    <div class="fc-back-word">${escHtml(w.word)}</div>
    <div class="fc-back-ko">${escHtml(w.meaning_ko)}</div>
    <div class="fc-back-en">${escHtml(w.meaning_en)}</div>
    <div class="fc-back-context">${ctxHtml}</div>
    <div class="fc-back-context-ko">${escHtml(w.context_meaning)}</div>
    <div class="fc-back-meta">
      <span class="badge badge-${w.difficulty}">${w.difficulty}</span>
      <span class="badge badge-part">${w.part}</span>
      <span style="font-size:0.75em;color:var(--text-secondary);">Q${w.question_number}</span>
    </div>
  `;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('flashcard').classList.toggle('flipped');
}

function fcNext() {
  if (fcIndex < fcWords.length - 1) {
    fcIndex++;
    renderFlashcard();
  }
}
function fcPrev() {
  if (fcIndex > 0) {
    fcIndex--;
    renderFlashcard();
  }
}
function fcMarkAndNext(status) {
  if (fcWords.length === 0) return;
  setWordStatus(fcWords[fcIndex].id, status);
  if (fcIndex < fcWords.length - 1) {
    fcIndex++;
    renderFlashcard();
  } else {
    // End of deck
    alert('학습 완료! ' + fcWords.length + '개 단어를 모두 확인했습니다.');
  }
}

// ============== QUIZ ==============
function startQuiz() {
  quizType = document.getElementById('quizType').value;
  const partF = document.getElementById('quizPart').value;
  const count = parseInt(document.getElementById('quizCount').value);

  let words = [...ALL_WORDS];
  if (partF !== 'all') words = words.filter(w => w.part === partF);

  // Shuffle
  for (let i = words.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [words[i], words[j]] = [words[j], words[i]];
  }

  quizWords = words.slice(0, Math.min(count, words.length));
  if (quizWords.length < 4) {
    alert('최소 4개 단어가 필요합니다.');
    return;
  }
  quizIndex = 0;
  quizCorrect = 0;
  quizWrong = [];
  quizConfused = [];
  quizAnswered = false;

  document.getElementById('quizSetup').style.display = 'none';
  document.getElementById('quizActive').style.display = 'block';
  document.getElementById('quizSummary').style.display = 'none';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const w = quizWords[quizIndex];
  quizAnswered = false;

  document.getElementById('quizScore').innerHTML =
    `문제 <b>${quizIndex + 1}</b> / ${quizWords.length} &nbsp;&nbsp; 정답: <b>${quizCorrect}</b>`;
  document.getElementById('quizNextBtn').style.display = 'none';
  document.getElementById('quizConfusedBtn').style.display = 'none';
  document.getElementById('quizConfusedBtn').innerHTML = '&#129300; 헷갈림';
  document.getElementById('quizConfusedBtn').classList.remove('confused-marked');
  document.getElementById('quizFeedback').className = 'quiz-feedback';
  document.getElementById('quizFeedback').style.display = 'none';

  if (quizType === 'en-to-ko') {
    document.getElementById('quizQuestion').textContent = w.word;
    document.getElementById('quizSub').textContent = '이 단어의 한국어 뜻은?';
  } else {
    document.getElementById('quizQuestion').textContent = w.meaning_ko;
    document.getElementById('quizSub').textContent = '이 뜻에 해당하는 영어 단어는?';
  }

  // Generate 4 options
  const correctIdx = Math.floor(Math.random() * 4);
  const options = [];
  const usedIds = new Set([w.id]);

  for (let i = 0; i < 4; i++) {
    if (i === correctIdx) {
      options.push(w);
    } else {
      let rand;
      let attempts = 0;
      do {
        rand = ALL_WORDS[Math.floor(Math.random() * ALL_WORDS.length)];
        attempts++;
      } while (usedIds.has(rand.id) && attempts < 100);
      usedIds.add(rand.id);
      options.push(rand);
    }
  }

  const optionsEl = document.getElementById('quizOptions');
  optionsEl.innerHTML = options.map((o, i) => {
    const text = quizType === 'en-to-ko' ? o.meaning_ko : o.word;
    return `<button class="quiz-option" data-idx="${i}" data-correct="${i === correctIdx}" onclick="quizAnswer(this, ${i === correctIdx}, ${w.id})">${escHtml(text)}</button>`;
  }).join('');
}

function quizAnswer(el, isCorrect, wordId) {
  if (quizAnswered) return;
  quizAnswered = true;

  const w = ALL_WORDS.find(x => x.id === wordId);
  document.querySelectorAll('.quiz-option').forEach(opt => {
    opt.classList.add('disabled');
    if (opt.dataset.correct === 'true') opt.classList.add('correct');
  });

  const fb = document.getElementById('quizFeedback');
  if (isCorrect) {
    quizCorrect++;
    el.classList.add('correct');
    fb.className = 'quiz-feedback correct-fb show';
    fb.innerHTML = '<b>&#9989; 정답!</b>';
    setWordStatus(wordId, 'mastered');
  } else {
    el.classList.add('wrong');
    quizWrong.push(w);
    fb.className = 'quiz-feedback wrong-fb show';

    let ctxHtml = escHtml(w.context);
    const re = new RegExp('(' + escRegex(w.word) + ')', 'gi');
    ctxHtml = ctxHtml.replace(re, '<b>$1</b>');

    fb.innerHTML = `<b>&#10060; 오답!</b><br>
      <strong>${escHtml(w.word)}</strong> = ${escHtml(w.meaning_ko)}<br>
      <span style="font-size:0.9em;color:var(--text-secondary);">${escHtml(w.meaning_en)}</span><br>
      <div style="margin-top:8px;padding:8px 12px;background:var(--bg-secondary);border-radius:6px;font-style:italic;font-size:0.9em;">${ctxHtml}</div>`;
    setWordStatus(wordId, 'learning');
  }
  fb.style.display = 'block';
  document.getElementById('quizNextBtn').style.display = 'inline-block';
  document.getElementById('quizConfusedBtn').style.display = 'inline-block';
  document.getElementById('quizConfusedBtn').dataset.wordId = wordId;
  document.getElementById('quizConfusedBtn').classList.remove('confused-marked');
}

function markConfused() {
  const btn = document.getElementById('quizConfusedBtn');
  const wordId = parseInt(btn.dataset.wordId);
  const w = ALL_WORDS.find(x => x.id === wordId);
  if (!w) return;
  setWordStatus(wordId, 'learning');
  if (!quizConfused.find(x => x.id === wordId)) {
    quizConfused.push(w);
  }
  btn.classList.add('confused-marked');
  btn.innerHTML = '&#10003; 헷갈림 표시됨';
}

function quizNext() {
  quizIndex++;
  if (quizIndex >= quizWords.length) {
    showQuizSummary();
  } else {
    renderQuizQuestion();
  }
}

function showQuizSummary() {
  document.getElementById('quizActive').style.display = 'none';
  const sumEl = document.getElementById('quizSummary');
  sumEl.style.display = 'block';
  const pct = Math.round((quizCorrect / quizWords.length) * 100);

  let wrongHtml = '';
  if (quizWrong.length > 0) {
    wrongHtml = '<div class="wrong-list"><h3>&#128680; 틀린 단어 (' + quizWrong.length + '개)</h3>' +
      quizWrong.map(w => `<div class="wrong-item">
        <div class="wi-word">${escHtml(w.word)}</div>
        <div class="wi-meaning">${escHtml(w.meaning_ko)} - ${escHtml(w.meaning_en)}</div>
      </div>`).join('') + '</div>';
  }

  let confusedHtml = '';
  const confusedOnly = quizConfused.filter(c => !quizWrong.find(w => w.id === c.id));
  if (confusedOnly.length > 0) {
    confusedHtml = '<div class="wrong-list" style="border-color:var(--warning);"><h3 style="color:var(--warning);">&#129300; 헷갈린 단어 (' + confusedOnly.length + '개) - 다시 공부하세요!</h3>' +
      confusedOnly.map(w => `<div class="wrong-item">
        <div class="wi-word">${escHtml(w.word)}</div>
        <div class="wi-meaning">${escHtml(w.meaning_ko)} - ${escHtml(w.meaning_en)}</div>
      </div>`).join('') + '</div>';
  }

  sumEl.innerHTML = `<div class="quiz-summary">
    <h2>&#127942; 퀴즈 완료!</h2>
    <div class="big-score">${pct}%</div>
    <div class="score-detail">${quizWords.length}문제 중 ${quizCorrect}개 정답</div>
    <div class="progress-bar" style="max-width:300px;margin:0 auto 20px;">
      <div class="progress-fill ${pct >= 80 ? 'green' : ''}" style="width:${pct}%"></div>
    </div>
    ${wrongHtml}
    ${confusedHtml}
    <button class="btn btn-primary" style="margin-top:20px;" onclick="resetQuiz();">다시 하기</button>
  </div>`;
}

function resetQuiz() {
  document.getElementById('quizSetup').style.display = 'block';
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizSummary').style.display = 'none';
}

// ============== PROGRESS PAGE ==============
function renderProgress() {
  const total = ALL_WORDS.length;
  const mastered = ALL_WORDS.filter(w => getWordStatus(w.id) === 'mastered').length;
  const learning = ALL_WORDS.filter(w => getWordStatus(w.id) === 'learning').length;
  const newCount = total - mastered - learning;

  document.getElementById('progressStats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">전체 단어</div>
      <div class="stat-value">${total}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">New (미학습)</div>
      <div class="stat-value" style="color:var(--text-secondary)">${newCount}</div>
      <div class="stat-sub">${total > 0 ? Math.round(newCount/total*100) : 0}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Learning (학습 중)</div>
      <div class="stat-value" style="color:var(--warning)">${learning}</div>
      <div class="stat-sub">${total > 0 ? Math.round(learning/total*100) : 0}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mastered (숙달)</div>
      <div class="stat-value" style="color:var(--success)">${mastered}</div>
      <div class="stat-sub">${total > 0 ? Math.round(mastered/total*100) : 0}%</div>
    </div>
  `;

  const parts = ['Part 3', 'Part 4', 'Part 5', 'Part 6', 'Part 7'];
  document.getElementById('progressParts').innerHTML = parts.map(p => {
    const pw = ALL_WORDS.filter(w => w.part === p);
    const pm = pw.filter(w => getWordStatus(w.id) === 'mastered').length;
    const pl = pw.filter(w => getWordStatus(w.id) === 'learning').length;
    const pn = pw.length - pm - pl;
    const pct = pw.length > 0 ? Math.round(((pm + pl) / pw.length) * 100) : 0;
    return `<div style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <strong>${p}</strong>
        <span style="font-size:0.85em;color:var(--text-secondary);">${pm + pl} / ${pw.length} (${pct}%)</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div style="display:flex;gap:16px;font-size:0.8em;color:var(--text-secondary);margin-top:4px;">
        <span>New: ${pn}</span>
        <span style="color:var(--warning)">Learning: ${pl}</span>
        <span style="color:var(--success)">Mastered: ${pm}</span>
      </div>
    </div>`;
  }).join('');
}

// ============== UTILS ==============
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ============== EVENTS ==============
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  renderDashboard();

  // Nav
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.page));
  });

  // Theme
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);

  // Word list filters
  ['searchInput'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => { wordListPage = 0; renderWordList(); });
  });
  ['filterPart', 'filterDiff', 'filterStatus', 'sortBy'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => { wordListPage = 0; renderWordList(); });
  });

  // Modal
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  // Flashcard
  document.getElementById('fcStart').addEventListener('click', startFlashcards);
  document.getElementById('fcShuffle').addEventListener('click', () => {
    if (fcWords.length > 0) shuffleFC();
    else startFlashcards();
  });
  document.getElementById('fcWrapper').addEventListener('click', flipCard);
  document.getElementById('fcPrev').addEventListener('click', fcPrev);
  document.getElementById('fcNext').addEventListener('click', fcNext);
  document.getElementById('fcDontKnow').addEventListener('click', () => fcMarkAndNext('new'));
  document.getElementById('fcLearning').addEventListener('click', () => fcMarkAndNext('learning'));
  document.getElementById('fcKnow').addEventListener('click', () => fcMarkAndNext('mastered'));

  // Quiz
  document.getElementById('quizStartBtn').addEventListener('click', startQuiz);
  document.getElementById('quizNextBtn').addEventListener('click', quizNext);

  // Reset
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('정말 모든 학습 기록을 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
      progress = {};
      saveProgress();
      renderProgress();
      alert('초기화 완료!');
    }
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (document.getElementById('modalOverlay').classList.contains('active')) {
      if (e.key === 'Escape') closeModal();
      return;
    }
    if (currentPage === 'study' && fcWords.length > 0) {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
      if (e.key === 'ArrowLeft') fcPrev();
      if (e.key === 'ArrowRight') fcNext();
      if (e.key === '1') fcMarkAndNext('new');
      if (e.key === '2') fcMarkAndNext('learning');
      if (e.key === '3') fcMarkAndNext('mastered');
    }
    if (currentPage === 'quiz' && quizAnswered) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); quizNext(); }
    }
  });

  // Touch swipe for flashcards
  let touchStartX = 0;
  let touchStartY = 0;
  document.getElementById('fcWrapper').addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.getElementById('fcWrapper').addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx > 0) fcPrev();
      else fcNext();
    }
  }, { passive: true });
});
</script>
</body>
</html>
